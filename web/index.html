<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>feedbot</title>
    <meta name="description" content="A private reading room for the blogs worth following." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23faf7f0'/%3E%3Cpath d='M8 7h16M8 13h16M8 19h11' stroke='%231c1a17' stroke-width='2.4' stroke-linecap='square'/%3E%3Ccircle cx='23' cy='24' r='4' fill='%23b8422a'/%3E%3C/svg%3E" />
    <!-- Set the theme before first paint so the page never flashes the wrong one. -->
    <script>
      (() => {
        const t = localStorage.getItem("feedbot:theme") || "paper";
        document.documentElement.dataset.theme = t;
        const s = localStorage.getItem("feedbot:fontsize");
        if (s) document.documentElement.style.setProperty("--reader-size", s + "px");
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
